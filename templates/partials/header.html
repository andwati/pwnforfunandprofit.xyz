<header class="site-header">
    <nav class="nav-container">
        <a href="{{ get_url(path="") }}" class="brand-link">
            <span class="brand-text">{{ config.title | default(value="pwna4profit") }}</span>
        </a>

        <div class="nav-right">
            <!-- Collapsible links -->
            <div id="nav-links" class="nav-links">
                {% if config.extra.menu %}
                    {% for item in config.extra.menu %}
                        <a href="{{ get_url(path=item.url) }}" class="nav-item">{{ item.name }}</a>
                    {% endfor %}
                {% endif %}
            </div>

            <div class="nav-controls">
                {% if config.extra.enable_search %}
                <button class="search-toggle" aria-label="Search">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                {% endif %}
                {% if config.extra.enable_theme_toggle %}
                <button id="theme-toggle" class="theme-toggle hover-scale" aria-label="Toggle Dark Mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a10 10 0 0 0 0 20z" fill="currentColor"></path></svg>
                </button>
                {% endif %}
                <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                    <svg class="hamburger-icon" viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    <svg class="close-icon" viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
    </nav>
</header>
