<div id="search-overlay" class="search-overlay">
    <div class="search-modal">
        <div class="search-header">
            <input type="search" id="search-input" class="search-input" placeholder="Search posts..." autocomplete="off" />
            <button id="search-close" class="search-close" aria-label="Close search">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="search-results" class="search-results"></div>
        <div class="search-footer">
            <kbd>ESC</kbd> to close
        </div>
    </div>
</div>
