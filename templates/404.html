{% extends "base.html" %}

{% block title %}404 — command not found | {{ config.title }}{% endblock title %}
{% block description %}The page you requested could not be found.{% endblock description %}

{% block content %}
<div class="notfound-wrap">
  <div class="term-window" role="main" aria-label="404 error terminal">

    <div class="term-titlebar" aria-hidden="true">
      <div class="term-dots">
        <span class="dot-red"></span>
        <span class="dot-yellow"></span>
        <span class="dot-green"></span>
      </div>
      <span class="term-titlebar-label">bash — pwnbox</span>
    </div>

    <div class="term-body" id="term-body"
      data-link-home="{{ get_url(path="") }}"
      data-link-posts="{{ get_url(path="/posts") }}"
      data-link-tags="{{ get_url(path="/tags") }}">
      <!-- lines injected by 404.js -->
    </div>

  </div>
</div>
{% endblock content %}

{% block scripts %}
<script defer src="{{ get_url(path="js/404.js") }}"></script>
{% endblock scripts %}
