{% extends "base.html" %}

{% block title %}Tags | {{ config.title }}{% endblock title %}

{% block content %}
<div class="post-detail">
    <header class="post-header">
        <h1 class="post-title">Tags</h1>
    </header>
    
    <div class="post-tags" style="flex-wrap: wrap;">
        {% for term in terms %}
        <a href="{{ term.permalink }}" class="tag hover-scale">{{ term.name }} ({{ term.pages | length }})</a>
        {% endfor %}
    </div>
</div>
{% endblock content %}
