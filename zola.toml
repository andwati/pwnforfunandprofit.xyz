base_url = "https://pwnforfunandprofit.xyz"
title = "Pwn For Fun And Profit"
description = "Hacking the Narrative, One Byte at a Time."
compile_sass = true
build_search_index = false
taxonomies = [ {name = "tags"} ]
generate_feeds = true
feed_filenames = ["rss.xml"]
generate_robots_txt = true

[markdown.highlighting]
theme = "catppuccin-mocha"

[extra]
# Analytics
google_analytics = "G-9TTGF9D8X3"
google_site_verification = ""

# Author Information
author = "mockingspectre"

# Profile Section (Homepage)
show_profile = true
avatar_url = "/images/avatar.webp"
profile_subtitle = "offending binaries"

# Social Links
github_url = "https://github.com/andwati"
twitter_url = "https://twitter.com/andwati_"
linkedin_url = ""
email = "andwatiian@gmail.com"

# Comments (Utterances)
enable_comments = true
utterances_repo = "andwati/pwnforfunandprofit.xyz"
utterances_theme = "github-dark"

# Navigation Menu
[[extra.menu]]
name = "About"
url = "/about/"
[[extra.menu]]
name = "Posts"
url = "/posts"
[[extra.menu]]
name = "Tags"
url = "/tags/"
[[extra.menu]]
name = "Archive"
url = "@/archive/_index.md"

# Features
enable_search = false
enable_theme_toggle = true
show_rss_link = true
